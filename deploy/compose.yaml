services:
  app:
    image: ${AUBB_APP_IMAGE:?AUBB_APP_IMAGE is required}
    restart: unless-stopped
    environment:
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:?SPRING_DATASOURCE_URL is required}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:?SPRING_DATASOURCE_USERNAME is required}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD is required}
      SPRING_RABBITMQ_HOST: ${SPRING_RABBITMQ_HOST:-}
      SPRING_RABBITMQ_PORT: ${SPRING_RABBITMQ_PORT:-5672}
      SPRING_RABBITMQ_USERNAME: ${SPRING_RABBITMQ_USERNAME:-}
      SPRING_RABBITMQ_PASSWORD: ${SPRING_RABBITMQ_PASSWORD:-}
      AUBB_JWT_SECRET: ${AUBB_JWT_SECRET:?AUBB_JWT_SECRET is required}
      AUBB_API_DOCS_ENABLED: ${AUBB_API_DOCS_ENABLED:-false}
      AUBB_SWAGGER_UI_ENABLED: ${AUBB_SWAGGER_UI_ENABLED:-false}
      AUBB_BOOTSTRAP_ENABLED: ${AUBB_BOOTSTRAP_ENABLED:-false}
      AUBB_MINIO_ENABLED: ${AUBB_MINIO_ENABLED:-false}
      AUBB_MINIO_ENDPOINT: ${AUBB_MINIO_ENDPOINT:-}
      AUBB_MINIO_ACCESS_KEY: ${AUBB_MINIO_ACCESS_KEY:-}
      AUBB_MINIO_SECRET_KEY: ${AUBB_MINIO_SECRET_KEY:-}
      AUBB_MINIO_BUCKET: ${AUBB_MINIO_BUCKET:-aubb-assets}
      AUBB_MINIO_AUTO_CREATE_BUCKET: ${AUBB_MINIO_AUTO_CREATE_BUCKET:-false}
      AUBB_GO_JUDGE_ENABLED: ${AUBB_GO_JUDGE_ENABLED:-false}
      AUBB_GO_JUDGE_BASE_URL: ${AUBB_GO_JUDGE_BASE_URL:-}
      AUBB_REDIS_ENABLED: ${AUBB_REDIS_ENABLED:-false}
      AUBB_REDIS_HOST: ${AUBB_REDIS_HOST:-}
      AUBB_REDIS_PORT: ${AUBB_REDIS_PORT:-6379}
      AUBB_REDIS_PASSWORD: ${AUBB_REDIS_PASSWORD:-}
      AUBB_REDIS_DATABASE: ${AUBB_REDIS_DATABASE:-0}
      AUBB_REDIS_NAMESPACE: ${AUBB_REDIS_NAMESPACE:-aubb}
      AUBB_REDIS_RATE_LIMIT_ENABLED: ${AUBB_REDIS_RATE_LIMIT_ENABLED:-true}
      AUBB_JUDGE_QUEUE_ENABLED: ${AUBB_JUDGE_QUEUE_ENABLED:-false}
      AUBB_JUDGE_QUEUE_PUBLISHER_ENABLED: ${AUBB_JUDGE_QUEUE_PUBLISHER_ENABLED:-true}
      AUBB_JUDGE_QUEUE_CONSUMER_ENABLED: false
      AUBB_JUDGE_QUEUE_NAME: ${AUBB_JUDGE_QUEUE_NAME:-aubb.judge.jobs}
      AUBB_JUDGE_QUEUE_DLQ_NAME: ${AUBB_JUDGE_QUEUE_DLQ_NAME:-aubb.judge.jobs.dlq}
      AUBB_JUDGE_QUEUE_DLX: ${AUBB_JUDGE_QUEUE_DLX:-aubb.judge.jobs.dlx}
      AUBB_JUDGE_QUEUE_CONCURRENCY: ${AUBB_JUDGE_QUEUE_CONCURRENCY:-4}
      AUBB_JUDGE_QUEUE_PREFETCH: ${AUBB_JUDGE_QUEUE_PREFETCH:-8}
      AUBB_JUDGE_QUEUE_MAX_ATTEMPTS: ${AUBB_JUDGE_QUEUE_MAX_ATTEMPTS:-3}
      AUBB_DEPLOY_ENV: ${AUBB_DEPLOY_ENV:-production}
      AUBB_TRACING_ENABLED: ${AUBB_TRACING_ENABLED:-true}
      AUBB_TRACING_SAMPLING_PROBABILITY: ${AUBB_TRACING_SAMPLING_PROBABILITY:-1.0}
      AUBB_OTLP_TRACING_ENDPOINT: ${AUBB_OTLP_TRACING_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${AUBB_OTLP_TRACING_ENDPOINT:-}
      OTEL_SERVICE_NAME: AUBB-Server
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=aubb,deployment.environment=${AUBB_DEPLOY_ENV:-production}
    ports:
      - '${AUBB_APP_PORT:-8080}:8080'
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health/readiness >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
  judge-worker:
    image: ${AUBB_APP_IMAGE:?AUBB_APP_IMAGE is required}
    restart: unless-stopped
    environment:
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      SPRING_MAIN_WEB_APPLICATION_TYPE: none
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:?SPRING_DATASOURCE_URL is required}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:?SPRING_DATASOURCE_USERNAME is required}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD is required}
      SPRING_RABBITMQ_HOST: ${SPRING_RABBITMQ_HOST:-}
      SPRING_RABBITMQ_PORT: ${SPRING_RABBITMQ_PORT:-5672}
      SPRING_RABBITMQ_USERNAME: ${SPRING_RABBITMQ_USERNAME:-}
      SPRING_RABBITMQ_PASSWORD: ${SPRING_RABBITMQ_PASSWORD:-}
      AUBB_JWT_SECRET: ${AUBB_JWT_SECRET:?AUBB_JWT_SECRET is required}
      AUBB_API_DOCS_ENABLED: "false"
      AUBB_SWAGGER_UI_ENABLED: "false"
      AUBB_MINIO_ENABLED: ${AUBB_MINIO_ENABLED:-false}
      AUBB_MINIO_ENDPOINT: ${AUBB_MINIO_ENDPOINT:-}
      AUBB_MINIO_ACCESS_KEY: ${AUBB_MINIO_ACCESS_KEY:-}
      AUBB_MINIO_SECRET_KEY: ${AUBB_MINIO_SECRET_KEY:-}
      AUBB_MINIO_BUCKET: ${AUBB_MINIO_BUCKET:-aubb-assets}
      AUBB_MINIO_AUTO_CREATE_BUCKET: ${AUBB_MINIO_AUTO_CREATE_BUCKET:-false}
      AUBB_GO_JUDGE_ENABLED: ${AUBB_GO_JUDGE_ENABLED:-false}
      AUBB_GO_JUDGE_BASE_URL: ${AUBB_GO_JUDGE_BASE_URL:-}
      AUBB_REDIS_ENABLED: ${AUBB_REDIS_ENABLED:-false}
      AUBB_REDIS_HOST: ${AUBB_REDIS_HOST:-}
      AUBB_REDIS_PORT: ${AUBB_REDIS_PORT:-6379}
      AUBB_REDIS_PASSWORD: ${AUBB_REDIS_PASSWORD:-}
      AUBB_REDIS_DATABASE: ${AUBB_REDIS_DATABASE:-0}
      AUBB_REDIS_NAMESPACE: ${AUBB_REDIS_NAMESPACE:-aubb}
      AUBB_REDIS_RATE_LIMIT_ENABLED: ${AUBB_REDIS_RATE_LIMIT_ENABLED:-true}
      AUBB_JUDGE_QUEUE_ENABLED: ${AUBB_JUDGE_QUEUE_ENABLED:-false}
      AUBB_JUDGE_QUEUE_PUBLISHER_ENABLED: false
      AUBB_JUDGE_QUEUE_CONSUMER_ENABLED: true
      AUBB_JUDGE_QUEUE_NAME: ${AUBB_JUDGE_QUEUE_NAME:-aubb.judge.jobs}
      AUBB_JUDGE_QUEUE_DLQ_NAME: ${AUBB_JUDGE_QUEUE_DLQ_NAME:-aubb.judge.jobs.dlq}
      AUBB_JUDGE_QUEUE_DLX: ${AUBB_JUDGE_QUEUE_DLX:-aubb.judge.jobs.dlx}
      AUBB_JUDGE_QUEUE_CONCURRENCY: ${AUBB_JUDGE_QUEUE_CONCURRENCY:-4}
      AUBB_JUDGE_QUEUE_PREFETCH: ${AUBB_JUDGE_QUEUE_PREFETCH:-8}
      AUBB_JUDGE_QUEUE_MAX_ATTEMPTS: ${AUBB_JUDGE_QUEUE_MAX_ATTEMPTS:-3}
      AUBB_DEPLOY_ENV: ${AUBB_DEPLOY_ENV:-production}
      AUBB_TRACING_ENABLED: ${AUBB_TRACING_ENABLED:-true}
      AUBB_TRACING_SAMPLING_PROBABILITY: ${AUBB_TRACING_SAMPLING_PROBABILITY:-1.0}
      AUBB_OTLP_TRACING_ENDPOINT: ${AUBB_OTLP_TRACING_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${AUBB_OTLP_TRACING_ENDPOINT:-}
      OTEL_SERVICE_NAME: AUBB-Server
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=aubb,deployment.environment=${AUBB_DEPLOY_ENV:-production}
