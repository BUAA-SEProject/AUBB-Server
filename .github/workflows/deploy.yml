name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'GitHub Environment 名称，例如 staging 或 production'
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: '要部署的镜像 tag，例如 sha-abcdef1 或 v0.0.1'
        required: true
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image name
        id: image_name
        run: echo "image=${REGISTRY}/${GITHUB_REPOSITORY,,}:${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"

      - name: Prepare SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Render deployment env file
        env:
          AUBB_APP_IMAGE: ${{ steps.image_name.outputs.image }}
          AUBB_APP_PORT: ${{ vars.AUBB_APP_PORT || '8080' }}
          SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          SPRING_RABBITMQ_HOST: ${{ secrets.SPRING_RABBITMQ_HOST }}
          SPRING_RABBITMQ_PORT: ${{ secrets.SPRING_RABBITMQ_PORT }}
          SPRING_RABBITMQ_USERNAME: ${{ secrets.SPRING_RABBITMQ_USERNAME }}
          SPRING_RABBITMQ_PASSWORD: ${{ secrets.SPRING_RABBITMQ_PASSWORD }}
          SPRING_DATA_REDIS_HOST: ${{ secrets.SPRING_DATA_REDIS_HOST }}
          SPRING_DATA_REDIS_PORT: ${{ secrets.SPRING_DATA_REDIS_PORT }}
          AUBB_JWT_SECRET: ${{ secrets.AUBB_JWT_SECRET }}
          AUBB_API_DOCS_ENABLED: ${{ vars.AUBB_API_DOCS_ENABLED || 'false' }}
          AUBB_SWAGGER_UI_ENABLED: ${{ vars.AUBB_SWAGGER_UI_ENABLED || 'false' }}
          AUBB_BOOTSTRAP_ENABLED: ${{ vars.AUBB_BOOTSTRAP_ENABLED || 'false' }}
          AUBB_MINIO_ENABLED: ${{ vars.AUBB_MINIO_ENABLED || 'false' }}
          AUBB_MINIO_ENDPOINT: ${{ secrets.AUBB_MINIO_ENDPOINT }}
          AUBB_MINIO_ACCESS_KEY: ${{ secrets.AUBB_MINIO_ACCESS_KEY }}
          AUBB_MINIO_SECRET_KEY: ${{ secrets.AUBB_MINIO_SECRET_KEY }}
          AUBB_MINIO_BUCKET: ${{ vars.AUBB_MINIO_BUCKET || 'aubb-assets' }}
          AUBB_MINIO_AUTO_CREATE_BUCKET: ${{ vars.AUBB_MINIO_AUTO_CREATE_BUCKET || 'false' }}
          AUBB_GO_JUDGE_ENABLED: ${{ vars.AUBB_GO_JUDGE_ENABLED || 'false' }}
          AUBB_GO_JUDGE_BASE_URL: ${{ secrets.AUBB_GO_JUDGE_BASE_URL }}
          AUBB_JUDGE_QUEUE_ENABLED: ${{ vars.AUBB_JUDGE_QUEUE_ENABLED || 'false' }}
          AUBB_JUDGE_QUEUE_NAME: ${{ vars.AUBB_JUDGE_QUEUE_NAME || 'aubb.judge.jobs' }}
          AUBB_JUDGE_QUEUE_CONCURRENCY: ${{ vars.AUBB_JUDGE_QUEUE_CONCURRENCY || '4' }}
        run: |
          set -euo pipefail
          cat > deploy/.env.production <<EOF
          AUBB_APP_IMAGE=${AUBB_APP_IMAGE}
          AUBB_APP_PORT=${AUBB_APP_PORT}
          SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
          SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
          SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
          SPRING_RABBITMQ_HOST=${SPRING_RABBITMQ_HOST}
          SPRING_RABBITMQ_PORT=${SPRING_RABBITMQ_PORT:-5672}
          SPRING_RABBITMQ_USERNAME=${SPRING_RABBITMQ_USERNAME}
          SPRING_RABBITMQ_PASSWORD=${SPRING_RABBITMQ_PASSWORD}
          SPRING_DATA_REDIS_HOST=${SPRING_DATA_REDIS_HOST}
          SPRING_DATA_REDIS_PORT=${SPRING_DATA_REDIS_PORT:-6379}
          AUBB_JWT_SECRET=${AUBB_JWT_SECRET}
          AUBB_API_DOCS_ENABLED=${AUBB_API_DOCS_ENABLED}
          AUBB_SWAGGER_UI_ENABLED=${AUBB_SWAGGER_UI_ENABLED}
          AUBB_BOOTSTRAP_ENABLED=${AUBB_BOOTSTRAP_ENABLED}
          AUBB_MINIO_ENABLED=${AUBB_MINIO_ENABLED}
          AUBB_MINIO_ENDPOINT=${AUBB_MINIO_ENDPOINT}
          AUBB_MINIO_ACCESS_KEY=${AUBB_MINIO_ACCESS_KEY}
          AUBB_MINIO_SECRET_KEY=${AUBB_MINIO_SECRET_KEY}
          AUBB_MINIO_BUCKET=${AUBB_MINIO_BUCKET}
          AUBB_MINIO_AUTO_CREATE_BUCKET=${AUBB_MINIO_AUTO_CREATE_BUCKET}
          AUBB_GO_JUDGE_ENABLED=${AUBB_GO_JUDGE_ENABLED}
          AUBB_GO_JUDGE_BASE_URL=${AUBB_GO_JUDGE_BASE_URL}
          AUBB_JUDGE_QUEUE_ENABLED=${AUBB_JUDGE_QUEUE_ENABLED}
          AUBB_JUDGE_QUEUE_NAME=${AUBB_JUDGE_QUEUE_NAME}
          AUBB_JUDGE_QUEUE_CONCURRENCY=${AUBB_JUDGE_QUEUE_CONCURRENCY}
          EOF

      - name: Upload deploy bundle
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${DEPLOY_PATH}'"
          scp -P "${DEPLOY_PORT:-22}" deploy/compose.yaml deploy/.env.production "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"

      - name: Apply deployment
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          set -euo pipefail
          GHCR_TOKEN_B64="$(printf '%s' "$GHCR_TOKEN" | base64 -w0)"
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" "
            set -euo pipefail
            cd '${DEPLOY_PATH}'
            printf '%s' '${GHCR_TOKEN_B64}' | base64 -d | docker login ghcr.io -u '${GHCR_USERNAME}' --password-stdin
            docker compose --env-file .env.production pull app
            docker compose --env-file .env.production up -d
            docker compose --env-file .env.production ps
            for attempt in \$(seq 1 24); do
              if docker compose --env-file .env.production exec -T app curl -fsS http://localhost:8080/actuator/health/readiness; then
                exit 0
              fi
              sleep 5
            done
            exit 1
          "

      - name: Collect remote app logs
        if: failure()
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" "
            cd '${DEPLOY_PATH}' && docker compose --env-file .env.production logs --no-color --tail=200 app
          " > deploy-app.log || true

      - name: Upload remote app logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-app-log
          if-no-files-found: ignore
          path: deploy-app.log
