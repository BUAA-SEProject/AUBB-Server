global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: aubb

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: aubb-app
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - app:8080
        labels:
          component: api
          env: staging

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
