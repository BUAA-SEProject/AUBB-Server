services:
  postgres:
    image: 'postgres:16'
    environment:
      - 'POSTGRES_DB=mydatabase'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
    ports:
      - '5432'
  rabbitmq:
    image: 'rabbitmq:4.1.0-management'
    environment:
      - 'RABBITMQ_DEFAULT_PASS=secret'
      - 'RABBITMQ_DEFAULT_USER=myuser'
    ports:
      - '5672'
      - '15672:15672'
  redis:
    image: 'redis:7'
    ports:
      - '6379'
  minio:
    image: 'minio/minio:RELEASE.2025-09-07T16-13-09Z'
    command: server /data --console-address ":9001"
    environment:
      - 'MINIO_ROOT_USER=aubbminio'
      - 'MINIO_ROOT_PASSWORD=aubbminio-secret'
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - 'minio-data:/data'
  go-judge:
    build:
      context: .
      dockerfile: docker/go-judge/Dockerfile
    privileged: true
    shm_size: '256m'
    ports:
      - '5050:5050'

volumes:
  minio-data:
