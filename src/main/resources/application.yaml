spring:
  application:
    name: AUBB-Server
  mvc:
    problemdetails:
      enabled: true
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  health:
    rabbit:
      enabled: false
    redis:
      enabled: false
  endpoint:
    health:
      probes:
        enabled: true
info:
  app:
    name: AUBB-Server
    runtime: spring-boot-4-java-25
    harness: initialized
springdoc:
  api-docs:
    enabled: ${AUBB_API_DOCS_ENABLED:true}
  swagger-ui:
    enabled: ${AUBB_SWAGGER_UI_ENABLED:true}
aubb:
  security:
    jwt:
      issuer: AUBB-Server
      ttl: PT2H
      secret: ${AUBB_JWT_SECRET:change-this-secret-key-change-this-secret-key}
  storage:
    minio:
      enabled: ${AUBB_MINIO_ENABLED:false}
      endpoint: ${AUBB_MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${AUBB_MINIO_ACCESS_KEY:}
      secret-key: ${AUBB_MINIO_SECRET_KEY:}
      bucket: ${AUBB_MINIO_BUCKET:aubb-assets}
      auto-create-bucket: ${AUBB_MINIO_AUTO_CREATE_BUCKET:false}
