spring:
  application:
    name: AUBB-Server
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  health:
    db:
      enabled: false
    rabbit:
      enabled: false
    redis:
      enabled: false
  endpoint:
    health:
      probes:
        enabled: true
info:
  app:
    name: AUBB-Server
    runtime: spring-boot-4-java-25
    harness: initialized
